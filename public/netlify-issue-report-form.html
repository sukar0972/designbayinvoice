<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify issue report form</title>
  </head>
  <body>
    <form
      name="issue-report"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="issue-report" />
      <input type="email" name="email" />
      <input type="text" name="issue_type" />
      <input type="text" name="summary" />
      <textarea name="details"></textarea>
      <input type="text" name="page_url" />
      <input type="text" name="browser" />
      <input type="text" name="signed_in" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
